name: Release to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      draft_release:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate next version
        id: bump_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          
          # Remove -SNAPSHOT if present
          BASE_VERSION=$(echo $CURRENT | sed 's/-SNAPSHOT//')
          
          # Split version
          IFS='.' read -r -a PARTS <<< "$BASE_VERSION"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}
          
          # Apply bump
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"

      - name: Recursively update version references
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          echo "Updating all version references to: $NEW_VERSION"
          
          # â”€â”€ 1. gradle.properties (source of truth) â”€â”€
          sed -i "s/^version=.*/version=$NEW_VERSION/" gradle.properties
          echo "âś“ Updated gradle.properties"
          
          # â”€â”€ 2. build.gradle.kts (if any hardcoded version remains) â”€â”€
          sed -i "s/version = \"[0-9]*\\.[0-9]*\\.[0-9]*[^\"]*\"/version = \"$NEW_VERSION\"/" build.gradle.kts
          echo "âś“ Updated build.gradle.kts"
          
          # â”€â”€ 3. version.properties â”€â”€
          if [ -f "src/main/resources/version.properties" ]; then
            sed -i "s/^version=.*/version=$NEW_VERSION/" src/main/resources/version.properties
            echo "âś“ Updated version.properties"
          fi
          
          # â”€â”€ 4. README.md version references â”€â”€
          sed -i -E "s/(artificial-enchantments:)[0-9]+\.[0-9]+\.[0-9]+([^0-9]|$)/\1$NEW_VERSION\2/" README.md
          sed -i -E "s/(artificial-enchantments-)[0-9]+\.[0-9]+\.[0-9]+([^0-9]|$)/\1$NEW_VERSION\2/" README.md
          echo "âś“ Updated README.md"
          
          # â”€â”€ 5. All markdown files â”€â”€
          find . -type f -name "*.md" ! -path "./.git/*" ! -name "CHANGELOG.md" | while read -r f; do
            if grep -qE "(artificial-enchantments:)[0-9]+\.[0-9]+\.[0-9]+" "$f" || grep -qE "(artificial-enchantments-)[0-9]+\.[0-9]+\.[0-9]+" "$f"; then
              sed -i -E "s/(artificial-enchantments:)[0-9]+\.[0-9]+\.[0-9]+([^0-9]|$)/\1$NEW_VERSION\2/" "$f"
              sed -i -E "s/(artificial-enchantments-)[0-9]+\.[0-9]+\.[0-9]+([^0-9]|$)/\1$NEW_VERSION\2/" "$f"
              echo "âś“ Updated $f"
            fi
          done
          
          # â”€â”€ 6. plugin.yml version references â”€â”€
          if [ -f "src/main/resources/plugin.yml" ]; then
            sed -i -E "s/^version: .*/version: $NEW_VERSION/" src/main/resources/plugin.yml
            echo "âś“ Updated plugin.yml"
          fi
          
          echo ""
          echo "All version references updated to $NEW_VERSION"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish --no-daemon

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "release: v${{ steps.bump_version.outputs.new_version }}"

      - name: Create and push tag
        run: |
          git tag -a ${{ steps.bump_version.outputs.tag_version }} -m "Release ${{ steps.bump_version.outputs.new_version }}"
          git push origin ${{ steps.bump_version.outputs.tag_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.tag_version }}
          name: Release ${{ steps.bump_version.outputs.new_version }}
          body: |
            ## Installation
            
            ### Gradle (Kotlin DSL)
            ```kotlin
            dependencies {
                compileOnly("io.artificial:artificial-enchantments:${{ steps.bump_version.outputs.new_version }}")
            }
            ```
            
            ### Maven
            ```xml
            <dependency>
              <groupId>io.artificial</groupId>
              <artifactId>artificial-enchantments</artifactId>
              <version>${{ steps.bump_version.outputs.new_version }}</version>
            </dependency>
            ```
            
            ### GitHub Packages Repository
            ```kotlin
            repositories {
                maven {
                    url = uri("https://maven.pkg.github.com/${{ github.repository }}")
                    credentials {
                        username = System.getenv("GITHUB_ACTOR")
                        password = System.getenv("GITHUB_TOKEN")
                    }
                }
            }
            ```
          draft: ${{ github.event.inputs.draft_release }}
          generate_release_notes: true
          files: |
            build/libs/artificial-enchantments-*.jar
            !build/libs/*-unshaded.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}