name: Release to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      draft_release:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate next version
        id: bump_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          
          # Remove -SNAPSHOT if present
          BASE_VERSION=$(echo $CURRENT | sed 's/-SNAPSHOT//')
          
          # Split version
          IFS='.' read -r -a PARTS <<< "$BASE_VERSION"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}
          
          # Apply bump
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag_version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"

      - name: Recursively update version references
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          TAG_VERSION="${{ steps.bump_version.outputs.tag_version }}"
          echo "Updating all version references to: $NEW_VERSION (tag: $TAG_VERSION)"

          # ── 1. gradle.properties (source of truth) ──
          sed -i "s/^version=.*/version=$NEW_VERSION/" gradle.properties
          echo "✓ Updated gradle.properties"

          # ── 2. build.gradle.kts (if any hardcoded version remains) ──
          sed -i "s/version = \"[0-9]*\\.[0-9]*\\.[0-9]*[^\"]*\"/version = \"$NEW_VERSION\"/" build.gradle.kts
          echo "✓ Updated build.gradle.kts"

          # ── 3. version.properties ──
          if [ -f "src/main/resources/version.properties" ]; then
            sed -i "s/^version=.*/version=$NEW_VERSION/" src/main/resources/version.properties
            echo "✓ Updated version.properties"
          fi

          # ── 4. plugin.yml version references ──
          if [ -f "src/main/resources/plugin.yml" ]; then
            sed -i -E "s/^version: .*/version: $NEW_VERSION/" src/main/resources/plugin.yml
            echo "✓ Updated plugin.yml"
          fi

          # ── 5. README.md ──
          # GitHub Packages artifact references
          sed -i -E "s/(artificial-enchantments:)[0-9]+\.[0-9]+\.[0-9]+/\1$NEW_VERSION/g" README.md
          # JAR filenames and release URL paths
          sed -i -E "s/(artificial-enchantments-)[0-9]+\.[0-9]+\.[0-9]+/\1$NEW_VERSION/g" README.md
          # JitPack v-prefixed versions
          sed -i -E "s/(artificial-enchantments:v)[0-9]+\.[0-9]+\.[0-9]+/\1$TAG_VERSION/g" README.md
          # Release download URLs: update both tag path and jar name
          sed -i -E "s|(/releases/download/v)[0-9]+\.[0-9]+\.[0-9]+(/artificial-enchantments-)[0-9]+\.[0-9]+\.[0-9]+|\1$TAG_VERSION\2$NEW_VERSION|g" README.md
          echo "✓ Updated README.md"

          # ── 6. All markdown files (including README) ──
          find . -type f -name "*.md" ! -path "./.git/*" | while read -r f; do
            # GitHub Packages artifact references
            sed -i -E "s/(artificial-enchantments:)[0-9]+\.[0-9]+\.[0-9]+/\1$NEW_VERSION/g" "$f"
            # JAR filenames
            sed -i -E "s/(artificial-enchantments-)[0-9]+\.[0-9]+\.[0-9]+/\1$NEW_VERSION/g" "$f"
            # JitPack v-prefixed versions
            sed -i -E "s/(artificial-enchantments:v)[0-9]+\.[0-9]+\.[0-9]+/\1$TAG_VERSION/g" "$f"
            # Release download URLs
            sed -i -E "s|(/releases/download/v)[0-9]+\.[0-9]+\.[0-9]+(/artificial-enchantments-)[0-9]+\.[0-9]+\.[0-9]+|\1$TAG_VERSION\2$NEW_VERSION|g" "$f"
            # Quoted/plain version numbers in code examples (e.g. // Returns "1.0.0")
            sed -i -E "s/\"[0-9]+\.[0-9]+\.[0-9]+\"/\"$NEW_VERSION\"/g" "$f"
            # Version headers (e.g. "Version 1.0.0")
            sed -i -E "s/Version [0-9]+\.[0-9]+\.[0-9]+/Version $NEW_VERSION/g" "$f"
            echo "✓ Updated $f"
          done

          echo ""
          echo "All version references updated to $NEW_VERSION"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish --no-daemon

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "release: v${{ steps.bump_version.outputs.new_version }}"

      - name: Create and push tag
        run: |
          git tag -a ${{ steps.bump_version.outputs.tag_version }} -m "Release ${{ steps.bump_version.outputs.new_version }}"
          git push origin ${{ steps.bump_version.outputs.tag_version }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.bump_version.outputs.tag_version }}^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log "$PREV_TAG"..${{ steps.bump_version.outputs.tag_version }} --pretty=format:"- %s" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        id: github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.tag_version }}
          name: Release ${{ steps.bump_version.outputs.new_version }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### Quick Start: JitPack (Recommended)

            No authentication required. JitPack builds automatically from GitHub tags.

            **Gradle (Kotlin DSL):**

            ```kotlin
            repositories {
                mavenCentral()
                maven { url = uri("https://jitpack.io") }
            }

            dependencies {
                compileOnly("com.github.modpotato-plugins:artificial-enchantments:${{ steps.bump_version.outputs.tag_version }}")
            }
            ```

            **Maven:**

            ```xml
            <repositories>
              <repository>
                <id>jitpack.io</id>
                <name>JitPack</name>
                <url>https://jitpack.io</url>
              </repository>
            </repositories>

            <dependency>
              <groupId>com.github.modpotato-plugins</groupId>
              <artifactId>artificial-enchantments</artifactId>
              <version>${{ steps.bump_version.outputs.tag_version }}</version>
              <scope>provided</scope>
            </dependency>
            ```

            ### Official: GitHub Packages

            Also published to GitHub Packages, which requires a PAT even for public repositories.

            **1. Create a PAT** with the `read:packages` scope:
            GitHub Settings → Developer settings → Personal access tokens → Tokens (classic)

            **2. Configure credentials** in `~/.gradle/gradle.properties` (global) or project `gradle.properties`:

            ```properties
            gpr.user=YOUR_GITHUB_USERNAME
            gpr.key=YOUR_PAT_TOKEN
            ```

            Or use environment variables:

            ```bash
            export GITHUB_ACTOR=YOUR_GITHUB_USERNAME
            export GITHUB_TOKEN=YOUR_PAT_TOKEN
            ```

            **3. Add the repository and dependency:**

            **Gradle (Kotlin DSL):**

            ```kotlin
            repositories {
                mavenCentral()
                maven {
                    name = "GitHubPackages"
                    url = uri("https://maven.pkg.github.com/modpotato-plugins/artificial-enchantments")
                    credentials {
                        username = project.findProperty("gpr.user") as String? ?: System.getenv("GITHUB_ACTOR")
                        password = project.findProperty("gpr.key") as String? ?: System.getenv("GITHUB_TOKEN")
                    }
                }
            }

            dependencies {
                compileOnly("io.artificial:artificial-enchantments:${{ steps.bump_version.outputs.new_version }}")
            }
            ```

            **Maven:**

            ```xml
            <repositories>
              <repository>
                <id>github</id>
                <name>GitHub Packages</name>
                <url>https://maven.pkg.github.com/modpotato-plugins/artificial-enchantments</url>
              </repository>
            </repositories>

            <dependency>
              <groupId>io.artificial</groupId>
              <artifactId>artificial-enchantments</artifactId>
              <version>${{ steps.bump_version.outputs.new_version }}</version>
              <scope>provided</scope>
            </dependency>
            ```

            ### Modrinth

            Also available on [Modrinth](https://modrinth.com/project/3r7G1rGR).
          draft: ${{ github.event.inputs.draft_release }}
          files: |
            build/libs/artificial-enchantments-*.jar
            !build/libs/*-unshaded.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 3r7G1rGR
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: build/libs/artificial-enchantments-${{ steps.bump_version.outputs.new_version }}.jar

          name: ${{ steps.bump_version.outputs.tag_version }}
          version: ${{ steps.bump_version.outputs.tag_version }}
          version-type: release

          changelog: ${{ steps.github_release.outputs.body }}

          loaders: |
            paper
            folia
            purpur
          game-versions: |
            1.21.x
            1.20.x
            26.1.x